name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install minimal CI dependencies
        run: |
          uv venv
          uv pip install -e . --no-deps
          uv pip install httpx openai pydantic rich tenacity typer pytest ruff

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q
